<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="炒粉大师 — 颠锅炒粉休闲小游戏，左右拖动颠锅，炒出完美粉！">
  <meta name="theme-color" content="#1A0F0A">
  <meta name="mobile-web-app-capable" content="yes">
  <title>炒粉大师 🍜</title>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div id="game-wrapper">
      <!-- 游戏画布 -->
      <canvas id="game-canvas" width="480" height="720"></canvas>

      <!-- HUD 顶栏 -->
      <div id="hud" class="hidden">
        <div class="hud-item">
          <span class="hud-label">分数</span>
          <span id="score-value" class="hud-value score-text">0</span>
        </div>
        <div class="hud-item">
          <span id="timer-value" class="hud-value timer-text">60</span>
          <span class="hud-label">秒</span>
        </div>
      </div>

      <!-- 订单卡片 + 进度条 -->
      <div id="order-card" class="hidden glass-panel">
        <div class="order-row">
          <span id="order-emoji" class="order-emoji">🥢</span>
          <span id="order-name" class="order-name">经典炒粉</span>
          <span id="order-ingredients" class="order-items"></span>
        </div>
        <div id="cook-progress-bar">
          <div id="cook-progress-fill"></div>
          <span id="cook-progress-pct" class="progress-pct">0%</span>
        </div>
      </div>

      <!-- 音效开关 -->
      <button id="sound-toggle" class="sound-btn" title="音效开关">🔊</button>

      <!-- 菜单界面 -->
      <div id="menu-screen" class="screen">
        <div class="menu-content">
          <div class="title-glow"></div>
          <h1 class="game-title">
            <span class="title-emoji">🍜</span>
            <span class="title-text">炒粉大师</span>
          </h1>
          <p class="subtitle">左右颠锅 · 炒出美味</p>
          <div class="menu-decoration">
            <span>🔥</span><span>🥢</span><span>🌶️</span><span>🥩</span><span>🔥</span>
          </div>
          <button id="start-btn" class="primary-btn">
            <span class="btn-text">开始炒粉</span>
            <span class="btn-icon">🔥</span>
          </button>
          <div class="menu-tips">
            <p>👈 左右快速拖动 → 🍳 颠锅翻炒 → 🍽️ 出餐</p>
          </div>
        </div>
      </div>

      <!-- 结果界面 -->
      <div id="result-screen" class="screen hidden">
        <div class="result-content">
          <!-- 成品图 -->
          <div class="dish-showcase">
            <div class="dish-glow"></div>
            <img id="dish-image" class="dish-image" src="" alt="炒粉成品">
            <div id="result-stars" class="result-stars"></div>
          </div>
          <!-- 信息 -->
          <div class="result-info glass-panel">
            <h2 id="dish-name" class="dish-title">经典炒粉</h2>
            <div id="grade" class="grade grade-b">B</div>
            <div class="result-score-row">
              <span class="result-label">最终分数</span>
              <span id="final-score" class="final-score">0</span>
            </div>
            <div class="result-stats">
              <div class="stat-item">
                <span>🍽️</span>
                <span id="dishes-count">完成 0 道菜</span>
              </div>
              <div class="stat-item">
                <span>🍳</span>
                <span id="toss-count">颠锅 0 次</span>
              </div>
            </div>
            <button id="restart-btn" class="primary-btn">
              <span class="btn-text">再来一局</span>
              <span class="btn-icon">🔄</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
